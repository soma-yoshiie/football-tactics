<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>STARTING XI — 戦術ボード</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap');

:root{
  --bg:#0a0e0c;
  --panel:#111714;
  --panel2:#171f1b;
  --line:#243029;
  --grass-a:#15493a;
  --grass-b:#12402f;
  --lime:#caff3a;
  --lime-dim:#9ec92a;
  --ink:#eafff0;
  --mut:#7d9389;
  --red:#ff5b6e;
  --gold:#ffd166;
  --shadow:0 10px 30px rgba(0,0,0,.45);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  background:
    radial-gradient(120% 80% at 50% -10%, #16221c 0%, var(--bg) 55%) fixed;
  color:var(--ink);
  font-family:'Manrope',system-ui,sans-serif;
  overflow:hidden;
  user-select:none;-webkit-user-select:none;
}
.app{display:flex;flex-direction:column;height:100dvh;max-width:560px;margin:0 auto;position:relative;overflow:hidden}
.scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;touch-action:pan-y}

/* ---------- Header ---------- */
header{
  padding:calc(env(safe-area-inset-top) + 10px) 14px 8px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.brand{min-width:0;flex-shrink:1}
.logo{font-family:'Bebas Neue';font-size:25px;letter-spacing:1.5px;line-height:.9;color:var(--ink);white-space:nowrap}
.logo b{color:var(--lime)}
.tag{font-size:9px;letter-spacing:3px;color:var(--mut);text-transform:uppercase;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.tag.team{
  letter-spacing:.3px;text-transform:none;font-size:11px;font-weight:800;color:#0a0e0c;
  background:var(--lime);display:inline-flex;align-items:center;gap:4px;
  padding:2px 9px;border-radius:999px;
}
.tag.team::before{content:'●';font-size:7px}
.hbtn{margin-left:auto;display:flex;gap:6px;flex-shrink:0}
.icon{
  width:36px;height:36px;border-radius:11px;border:1px solid var(--line);
  background:var(--panel);color:var(--ink);font-size:15px;display:grid;place-items:center;
  cursor:pointer;transition:.15s;
}
.icon:active{transform:scale(.92);background:var(--panel2)}
.icon svg{width:19px;height:19px;display:block}

/* ---------- Formation bar ---------- */
.fbar{display:flex;gap:7px;overflow-x:auto;padding:4px 14px 10px;flex-shrink:0;scrollbar-width:none}
.fbar::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;padding:8px 13px;border-radius:999px;border:1px solid var(--line);
  background:var(--panel);font-family:'Bebas Neue';font-size:16px;letter-spacing:1.5px;
  color:var(--mut);cursor:pointer;transition:.15s;white-space:nowrap;
}
.chip.on{background:var(--lime);color:#0a0e0c;border-color:var(--lime);box-shadow:0 4px 14px rgba(202,255,58,.25)}
.chip:active{transform:scale(.95)}

/* ---------- Pitch ---------- */
.pitchwrap{padding:8px 12px 8px;position:relative}
.pitch{
  position:relative;width:100%;height:min(64vh,540px);border-radius:18px;overflow:hidden;
  background:
    repeating-linear-gradient(0deg, var(--grass-a) 0 9.09%, var(--grass-b) 9.09% 18.18%);
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.10), var(--shadow);
}
.pitch .markings{position:absolute;inset:0;pointer-events:none}
.mk{position:absolute;border:2px solid rgba(255,255,255,.16)}
.mk.center-line{left:5%;right:5%;top:50%;height:0;border-width:2px 0 0 0}
.mk.center-circle{left:50%;top:50%;width:34%;padding-bottom:34%;height:0;border-radius:50%;transform:translate(-50%,-50%)}
.mk.spot{width:5px;height:5px;background:rgba(255,255,255,.4);border:0;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%)}
.mk.box-top{left:24%;right:24%;top:0;height:14%;border-top:0}
.mk.box-top-s{left:36%;right:36%;top:0;height:6%;border-top:0}
.mk.box-bot{left:24%;right:24%;bottom:0;height:14%;border-bottom:0}
.mk.box-bot-s{left:36%;right:36%;bottom:0;height:6%;border-bottom:0}

/* ---------- Player token ---------- */
.tok{
  position:absolute;width:64px;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;cursor:grab;touch-action:none;z-index:2;
}
.tok.drag{z-index:30;cursor:grabbing}
.disc{
  width:44px;height:44px;border-radius:50%;display:grid;place-items:center;position:relative;
  background:linear-gradient(160deg,#1d2722,#10160f);
  border:2px solid var(--lime);box-shadow:0 5px 14px rgba(0,0,0,.5);
  font-weight:800;font-size:13px;color:var(--ink);
}
.tok.drag .disc{transform:scale(1.12);border-color:#fff}
.disc.empty{border-style:dashed;border-color:var(--mut);background:rgba(255,255,255,.03);color:var(--mut);font-weight:600;font-size:20px}
.disc svg{width:23px;height:23px;opacity:.9}
.disc.photo{background-size:cover;background-position:center 20%}
.disc.photo svg{display:none}
.disc .val{position:absolute;bottom:-6px;right:-6px;background:var(--lime);color:#0a0e0c;font-size:8px;font-weight:800;padding:1px 4px;border-radius:6px;border:1px solid #0a0e0c}
.role{margin-top:13px;font-family:'Bebas Neue';font-size:11px;letter-spacing:1px;color:var(--lime-dim);line-height:1}
.pname{margin-top:2px;font-size:10px;font-weight:700;max-width:74px;text-align:center;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;text-shadow:0 1px 3px #000}
.psub{margin-top:1px;font-size:8.5px;font-weight:700;max-width:78px;text-align:center;color:#ffc46b;opacity:.92;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;text-shadow:0 1px 3px #000}
.psub::before{content:'▸';font-size:7px;margin-right:2px;opacity:.7}
.flag{font-size:9px}
.disc .capt{position:absolute;top:-6px;left:-6px;width:15px;height:15px;border-radius:50%;background:var(--gold);color:#0a0e0c;font-size:9px;font-weight:800;display:grid;place-items:center;border:1.5px solid #0a0e0c}

/* ---------- Club emblem ---------- */
.emblem{
  flex:0 0 auto;width:22px;height:22px;border-radius:50%;
  display:inline-grid;place-items:center;
  font-family:'Bebas Neue';font-size:9px;letter-spacing:.3px;color:#fff;
  box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.25);
}
.prow .nm .emblem{vertical-align:middle;margin-right:6px}

/* ---------- Bottom info ---------- */
.statbar{
  flex-shrink:0;display:flex;gap:8px;padding:6px 14px calc(env(safe-area-inset-bottom) + 12px);
  align-items:stretch;cursor:pointer;
}
.statbar:active{opacity:.85}
.statmore{flex:0 0 auto;display:grid;place-items:center;width:42px;border:1px solid var(--line);border-radius:13px;background:var(--panel);font-size:18px}
.stat{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:8px 10px}
.stat .k{font-size:9px;letter-spacing:2px;color:var(--mut);text-transform:uppercase}
.stat .v{font-family:'Bebas Neue';font-size:22px;letter-spacing:1px;color:var(--lime);line-height:1}
.stat .v small{font-size:12px;color:var(--mut);font-family:'Manrope';font-weight:600}

/* ---------- Bench ---------- */
.bench{padding:2px 14px calc(env(safe-area-inset-bottom) + 30px)}
.bench .bh{display:flex;align-items:baseline;gap:9px;margin:8px 2px 11px}
.bench .bh b{font-family:'Bebas Neue';font-size:21px;letter-spacing:1.5px;color:var(--ink)}
.bench .bh span{font-size:11px;color:var(--mut)}
.bench .bh i{margin-left:auto;font-style:normal;font-size:10px;color:var(--lime-dim);letter-spacing:1px}
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:9px}
.bcard{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:11px 7px 9px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:.12s}
.bcard:active{transform:scale(.95);background:var(--panel2)}
.bav{width:46px;height:46px;border-radius:50%;background:linear-gradient(160deg,#1d2722,#10160f);border:2px solid var(--line);display:grid;place-items:center;color:var(--mut);overflow:hidden}
.bav svg{width:22px;height:22px;opacity:.85}
.bav.photo{background-size:cover;background-position:center 20%;border-color:var(--lime)}
.bav.photo svg{display:none}
.bcard .bn{font-size:11px;font-weight:800;text-align:center;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
.bcard .bp{font-family:'Bebas Neue';font-size:12px;letter-spacing:.5px;color:var(--lime-dim);line-height:.9}
.bcard .bv{font-size:10px;color:var(--mut);font-weight:700}
.benchEmpty{color:var(--mut);font-size:12px;padding:6px 4px 24px;line-height:1.8}
.scrollcue{text-align:center;color:var(--mut);font-size:10px;letter-spacing:2px;padding:2px 0 6px;opacity:.8}

/* ---------- Sheet / Modal ---------- */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);z-index:50;opacity:0;pointer-events:none;transition:.2s}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;max-width:560px;margin:0 auto;z-index:60;
  background:var(--panel);border-radius:22px 22px 0 0;border-top:1px solid var(--line);
  transform:translateY(110%);transition:transform .28s cubic-bezier(.3,.9,.3,1);
  max-height:86dvh;display:flex;flex-direction:column;box-shadow:0 -16px 40px rgba(0,0,0,.5);
}
.sheet.on{transform:translateY(0)}
.sheet.expanded{max-height:96dvh}
#sheetBody{display:flex;flex-direction:column;min-height:0;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#sheetBody>h2,#sheetBody>.controls{flex:0 0 auto}
.grabzone{flex:0 0 auto;display:flex;justify-content:center;align-items:center;height:30px;cursor:grab;touch-action:none}
.grabzone:active{cursor:grabbing}
.grab{width:44px;height:5px;border-radius:3px;background:var(--line);transition:width .15s,background .15s}
.grabzone:active .grab,.sheet.expanded .grab{width:64px;background:var(--mut)}
.sheet h2{font-family:'Bebas Neue';font-size:24px;letter-spacing:1.5px;margin:4px 16px 8px;display:flex;align-items:center;gap:8px}
.sheet h2 span{font-size:11px;font-family:'Manrope';font-weight:700;color:var(--lime);background:rgba(202,255,58,.12);padding:3px 9px;border-radius:999px;margin-left:auto}

/* search + filters */
.controls{padding:0 16px 8px}
.search{
  width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;
  padding:11px 13px;color:var(--ink);font-size:15px;font-family:'Manrope';outline:none;
}
.search::placeholder{color:var(--mut)}
.filters{display:flex;gap:6px;overflow-x:auto;padding:9px 0 2px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fchip{flex:0 0 auto;padding:6px 11px;border-radius:999px;border:1px solid var(--line);background:var(--panel2);color:var(--mut);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.fchip.on{background:var(--ink);color:#0a0e0c;border-color:var(--ink)}

/* list */
.list{overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;overscroll-behavior:contain;padding:4px 12px calc(env(safe-area-inset-bottom) + 18px);flex:1;min-height:0}
.prow{
  display:flex;align-items:center;gap:11px;padding:9px 8px;border-radius:13px;cursor:pointer;transition:.12s;
}
.prow:active{background:var(--panel2)}
.prow .pos{flex:0 0 40px;text-align:center;font-family:'Bebas Neue';font-size:14px;letter-spacing:.5px;color:#0a0e0c;background:var(--lime);border-radius:8px;padding:5px 0}
.prow .pos.gk{background:var(--gold)}
.prow .pos.df{background:#4fc3f7}
.prow .pos.mf{background:#caff3a}
.prow .pos.fw{background:#ff8a65}
.prow .meta{flex:1;min-width:0}
.prow .nm{font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prow .sub{font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prow .price{font-family:'Bebas Neue';font-size:17px;color:var(--lime);letter-spacing:.5px}
.prow.inxi{opacity:.4}
.prow .badge{font-size:9px;color:var(--gold);font-weight:800}
.empty-msg{text-align:center;color:var(--mut);padding:40px 20px;font-size:13px}

/* action menu */
.menu{padding:6px 14px calc(env(safe-area-inset-bottom) + 16px)}
.mitem{display:flex;align-items:center;gap:12px;padding:15px 14px;border-radius:13px;font-weight:700;font-size:15px;cursor:pointer}
.mitem:active{background:var(--panel2)}
.mitem .mi{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--panel2);font-size:15px}
.mitem.danger{color:var(--red)}
.mitem.danger .mi{color:var(--red)}

/* detail */
.detail{padding:0 18px calc(env(safe-area-inset-bottom) + 20px)}
.dhead{display:flex;align-items:center;gap:14px;padding:6px 0 14px}
.davatar{width:62px;height:62px;border-radius:50%;background:linear-gradient(160deg,#1d2722,#10160f);border:2px solid var(--lime);display:grid;place-items:center;font-family:'Bebas Neue';font-size:24px;color:var(--lime);overflow:hidden}
.davatar.photo{background-size:cover;background-position:center 20%}
.davatar.photo svg{display:none}
.davatar svg{width:30px;height:30px}
.dname{font-family:'Bebas Neue';font-size:30px;letter-spacing:1px;line-height:.95}
.dclub{font-size:13px;color:var(--mut);font-weight:600;margin-top:3px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:4px}
.dcell{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:11px 13px}
.dcell .dk{font-size:10px;letter-spacing:2px;color:var(--mut);text-transform:uppercase}
.dcell .dv{font-family:'Bebas Neue';font-size:23px;letter-spacing:1px;margin-top:2px}
.dcell.full{grid-column:1/3}
.dcell .dv.lime{color:var(--lime)}
.bigbtn{
  width:100%;margin-top:14px;padding:15px;border-radius:14px;border:0;cursor:pointer;
  font-family:'Bebas Neue';font-size:20px;letter-spacing:1.5px;background:var(--lime);color:#0a0e0c;
}
.bigbtn:active{transform:scale(.98)}
.bigbtn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}

.toast{
  position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#0a0e0c;padding:11px 18px;border-radius:999px;font-weight:800;font-size:13px;
  z-index:90;opacity:0;transition:.25s;pointer-events:none;box-shadow:var(--shadow);max-width:90%;text-align:center;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.hint{position:absolute;left:50%;top:46%;transform:translateX(-50%);text-align:center;color:rgba(255,255,255,.5);font-size:12px;pointer-events:none;width:80%}

/* ---------- Ball ---------- */
.ball{position:absolute;width:22px;height:22px;transform:translate(-50%,-50%);z-index:4;cursor:grab;touch-action:none}
.ball .b{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,#cfd6cf 70%,#9aa39a);box-shadow:0 3px 8px rgba(0,0,0,.55),inset 0 0 0 2px rgba(0,0,0,.12);position:relative}
.ball .b::after{content:"";position:absolute;inset:5px;border-radius:50%;background:
  radial-gradient(circle at 50% 50%,#222 0 3px,transparent 3.5px) ,
  radial-gradient(circle at 18% 70%,#222 0 1.6px,transparent 2px),
  radial-gradient(circle at 82% 70%,#222 0 1.6px,transparent 2px),
  radial-gradient(circle at 50% 12%,#222 0 1.6px,transparent 2px)}
.ball.drag .b{transform:scale(1.15)}

/* ---------- Path overlay ---------- */
.pathsvg{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none}
.pbadge{font:800 11px/1 'Manrope';fill:#0a0e0c}

/* token selected in studio */
.tok.sel .disc{box-shadow:0 0 0 3px var(--lime),0 5px 14px rgba(0,0,0,.5)}
.app.anim .tok{z-index:5}
/* 被ったトークン／ボールを前面に出す（2回タップで切替） */
.tok.raised{z-index:60!important}
.ball.raised{z-index:61!important}
.ball.raised .b{box-shadow:0 0 0 3px var(--lime),0 3px 8px rgba(0,0,0,.55)}
/* アニメ中は第二候補(2nd)を非表示 */
.app.anim .psub{display:none}

/* ---------- Studio panel ---------- */
.app.anim .statbar,.app.anim .bench,.app.anim .scrollcue,.app.anim .fbar{display:none}
.app.anim .scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}
.app.anim .pitch{height:min(38vh,360px)}
.studio{display:none;flex-direction:column;gap:9px;padding:10px 13px calc(env(safe-area-inset-bottom) + 14px);
  background:linear-gradient(180deg,var(--panel2),var(--panel));border-top:1px solid var(--line)}
.app.anim .studio{display:flex}
.stitle{display:flex;align-items:center;gap:8px}
.stitle b{font-family:'Bebas Neue';font-size:20px;letter-spacing:1.5px}
.stitle .hintxt{font-size:10px;color:var(--mut);margin-left:auto;text-align:right;line-height:1.3}
.transport{display:flex;gap:7px;align-items:center}
.tbtn{flex:0 0 auto;height:42px;min-width:42px;padding:0 12px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-weight:800;font-size:15px;display:grid;place-items:center;cursor:pointer}
.tbtn:active{transform:scale(.94)}
.tbtn.play{background:var(--lime);color:#0a0e0c;border-color:var(--lime);flex:1}
.tbtn.warn{color:var(--red)}
.tbtn.done{margin-left:auto}
.spd{display:flex;gap:4px;align-items:center;font-size:11px;color:var(--mut)}
.spd select{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:8px 6px;font-weight:700;font-family:'Manrope';font-size:13px}
.scrub{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:6px;background:var(--line);outline:none}
.scrub::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--lime);border:2px solid #0a0e0c;cursor:pointer}
.scrub::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--lime);border:2px solid #0a0e0c;cursor:pointer}
.tline{display:flex;justify-content:space-between;font-size:10px;color:var(--mut);font-variant-numeric:tabular-nums}
/* gantt + clips */
.clips{max-height:42vh;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;overscroll-behavior:contain;display:flex;flex-direction:column;gap:7px;padding:0 2px calc(env(safe-area-inset-bottom) + 20px)}
.clipsEmpty{color:var(--mut);font-size:12px;text-align:center;padding:16px 8px;line-height:1.7}
.clip{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 10px;cursor:pointer}
.clip.sel{border-color:var(--lime)}
.clip .crow{display:flex;align-items:center;gap:8px}
.cdot{width:13px;height:13px;border-radius:50%;flex:0 0 auto}
.cname{font-weight:800;font-size:13px}
.ctime{margin-left:auto;font-size:11px;color:var(--mut);font-variant-numeric:tabular-nums}
.gantt{margin-top:7px;height:9px;border-radius:5px;background:var(--panel2);position:relative;overflow:hidden}
.gbar{position:absolute;top:0;bottom:0;border-radius:5px;opacity:.9}
.cedit{margin-top:11px;display:none;flex-direction:column;gap:14px}
.clip.sel .cedit{display:flex}
.cedit label{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:10px;padding:2px 0}
.cedit label b{color:var(--lime);font-variant-numeric:tabular-nums;margin-left:auto;font-size:14px;min-width:46px;text-align:right}
.cedit input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:8px;border-radius:6px;background:var(--line);touch-action:pan-x}
.cedit input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--lime);border:3px solid #0a0e0c;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.cedit input[type=range]::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:var(--lime);border:3px solid #0a0e0c}
.cdel{align-self:stretch;color:var(--red);background:transparent;border:1px solid var(--line);border-radius:11px;padding:12px;font-weight:700;font-size:13px;cursor:pointer}
.cdel:active{background:rgba(255,91,110,.1)}

/* ---------- Recording indicator ---------- */
@keyframes recpulse{0%,100%{opacity:1}50%{opacity:.3}}
.app.anim .tok.drag .disc{border-color:var(--red)!important;box-shadow:0 0 0 4px rgba(255,91,110,.3),0 5px 14px rgba(0,0,0,.5)!important}
.app.anim .tok.drag .disc::before{
  content:'● REC';position:absolute;top:-22px;left:50%;transform:translateX(-50%);
  background:var(--red);color:#fff;font-size:8px;font-weight:800;
  padding:2px 7px;border-radius:5px;letter-spacing:.5px;white-space:nowrap;
  animation:recpulse .55s infinite;pointer-events:none;z-index:10;
}

/* ---------- Load more sentinel ---------- */
.loadmore{
  text-align:center;color:var(--mut);font-size:10px;letter-spacing:1.5px;
  padding:14px 8px 6px;opacity:.8;
}

/* ---------- Bench mode switcher ---------- */
.bench-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;color:var(--mut);font-weight:700;
  padding:2px 0;margin-bottom:4px;
}
.bench-badge b{color:var(--lime)}

/* ---------- Share preview ---------- */
.shareprev{border-radius:14px;overflow:hidden;border:1px solid var(--line);margin-bottom:10px;background:#000}
.shareprev img{display:block;width:100%;height:auto}
.sharecap{font-size:13px;color:var(--ink);line-height:1.5;margin:2px 2px 8px}
.sharelink{margin:0 2px 12px;overflow:hidden;white-space:nowrap}
.sharelink .sl{
  color:#4ea1ff;font-size:14px;font-weight:600;
  text-overflow:clip;          /* 見切れさせる（…を出さない） */
  display:inline-block;max-width:62%;overflow:hidden;white-space:nowrap;vertical-align:bottom;
}

/* ---------- Original team profile form ---------- */
.formfield{margin-bottom:11px}
.formfield label{display:block;font-size:11px;letter-spacing:1px;color:var(--mut);text-transform:uppercase;margin:0 2px 5px}
.formfield label i{font-style:normal;color:var(--lime-dim);margin-left:6px;letter-spacing:0;text-transform:none}
.colorrow{display:flex;gap:9px;flex-wrap:wrap;padding:2px}
.cdot2{width:30px;height:30px;border-radius:50%;cursor:pointer;box-shadow:inset 0 0 0 2px rgba(0,0,0,.25);transition:.12s}
.cdot2.on{box-shadow:0 0 0 3px var(--ink),inset 0 0 0 2px rgba(0,0,0,.25);transform:scale(1.08)}

/* ---------- Original team button ---------- */
.origbtn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:13px;border-radius:13px;margin-bottom:4px;cursor:pointer;
  font-weight:800;font-size:14px;color:#0a0e0c;
  background:linear-gradient(120deg,var(--lime),var(--lime-dim));
  box-shadow:0 4px 14px rgba(202,255,58,.22);
}
.origbtn:active{transform:scale(.98)}

/* ---------- Studio tool chips ---------- */
.sttools{display:flex;gap:7px;flex-wrap:wrap}
.toolchip{
  flex:0 0 auto;padding:7px 12px;border-radius:10px;
  border:1px solid var(--line);background:var(--panel2);
  color:var(--mut);font-size:12px;font-weight:700;cursor:pointer;
  white-space:nowrap;letter-spacing:.3px;transition:.12s;
}
.toolchip:active{transform:scale(.95)}
.toolchip.on{background:rgba(202,255,58,.14);color:var(--lime);border-color:rgba(202,255,58,.4)}

/* ---------- Fullplay overlay ---------- */
.fpover{
  position:fixed;inset:0;z-index:200;max-width:560px;margin:0 auto;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:calc(env(safe-area-inset-top) + 14px) 16px calc(env(safe-area-inset-bottom) + 24px);
  pointer-events:none;opacity:0;transition:opacity .22s;
}
.fpover.on{pointer-events:auto;opacity:1}
.fptop{display:flex;align-items:center;gap:10px}
.fpback{
  pointer-events:auto;cursor:pointer;user-select:none;
  display:inline-flex;align-items:center;gap:4px;
  font-family:'Manrope';font-weight:800;font-size:14px;color:var(--ink);
  background:rgba(10,14,12,.7);border:1px solid rgba(255,255,255,.14);
  padding:10px 16px;border-radius:999px;
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
}
.fpback:active{transform:scale(.95)}
.fptag{margin-left:auto;font-family:'Bebas Neue';font-size:20px;letter-spacing:1.5px;color:rgba(234,255,240,.85)}
.fptag b{color:var(--lime)}
.fpbtn.fpsmall svg{width:20px;height:20px;display:block}
.fpctrl{display:flex;align-items:center;gap:9px;justify-content:flex-end}
.fpbtn{
  border:0;cursor:pointer;user-select:none;
  font-family:'Bebas Neue';letter-spacing:1px;text-align:center;
}
.fpbtn:active{transform:scale(.94)}
.fpbtn.fplay{
  flex:0 0 auto;font-size:15px;padding:11px 20px;border-radius:13px;
  background:var(--lime);color:#0a0e0c;box-shadow:0 6px 22px rgba(0,0,0,.5)
}
.fpbtn.fpsmall{
  flex:0 0 auto;width:44px;height:44px;border-radius:13px;font-size:18px;
  display:grid;place-items:center;
  background:rgba(10,14,12,.72);color:var(--ink);
  border:1px solid rgba(255,255,255,.14);
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
}

/* ---------- Fullplay mode ---------- */
.app.fullplay header,
.app.fullplay .fbar,
.app.fullplay .studio{display:none!important}
.app.fullplay .scroll{overflow:hidden}
.app.fullplay .pitchwrap{padding:0!important}
.app.fullplay .pitch{

}

.app.anim.nopaths .pathsvg{opacity:0;pointer-events:none}

/* ピッチ座標(x:0-100左→右, y:0自陣→100敵陣)からポジション名を推定 */
function roleFromXY(x,y){
  if(y<15) return 'GK';
  if(y<37){ // ディフェンスライン
    if(x>=72) return 'RB';
    if(x<=28) return 'LB';
    return 'CB';
  }
  if(y<46){ // アンカー〜守備的MF
    if(x>=80) return 'RWB';
    if(x<=20) return 'LWB';
    return 'DM';
  }
  if(y<62){ // 中盤
    if(x>=80) return 'RM';
    if(x<=20) return 'LM';
    return 'CM';
  }
  if(y<72){ // トップ下
    if(x>=78) return 'RM';
    if(x<=22) return 'LM';
    return 'AM';
  }
  // 前線
  if(x>=68) return 'RW';
  if(x<=32) return 'LW';
  return 'ST';
}

function actorXY(a){ return a==='ball'?state.ball:state.slots[a]; }
function overlapGroupAt(actor){
  const b=actorXY(actor);
  const all=['ball',...state.slots.map((s,i)=>i).filter(i=>state.slots[i].pid!=null)];
  const near=all.filter(a=>{ const p=actorXY(a); return Math.hypot(p.x-b.x,p.y-b.y)<9; });
  // ボールを先頭にして「被って取りにくいボール」を最初に前面化
  near.sort((x,y)=> (x==='ball'?-1:0)-(y==='ball'?-1:0));
  return near;
}

  raised=a;
  Object.values(tokenEls).forEach(t=>t&&t.classList.remove('raised'));

/* チーム読込時に各スタメン枠の第二候補(slot.sub)を控えから自動で1回だけ割り当てる。
   以後はユーザーが手動で選び、選手交代や移動では自動で変わらない。 */
function autoAssignSubs(){
  if(!state.bench||!state.bench.length)return;
  const avail=state.bench.filter(pid=>!inXI(pid)).slice().sort((a,b)=>P[b][6]-P[a][6]);
  const used=new Set();
  state.slots.forEach(s=>{
    if(s.pid==null){s.sub=null;return;}
    const g=grp(s.role);
    let pid=avail.find(id=>!used.has(id)&&grp(P[id][1])===g);
    if(pid!=null){ used.add(pid); s.sub=pid; } else s.sub=null;
  });
}

/* =========================================================
   Drag & tap on tokens
   ========================================================= */
function attachDrag(el,actor){
  let sx,sy,ox,oy,moved,rect,recording,pts;
  const base=()=>actor==='ball'?state.ball:state.slots[actor];
  el.addEventListener('pointerdown',e=>{
    e.preventDefault();
    rect=pitch.getBoundingClientRect();moved=false;
    sx=e.clientX;sy=e.clientY;const b=base();ox=b.x;oy=b.y;
    el.setPointerCapture(e.pointerId);el.classList.add('drag');
    if(mode==='anim'){recording=true;pts=[{x:ox,y:oy}];}
  });
  el.addEventListener('pointermove',e=>{
    if(sx===undefined)return;
    if(Math.abs(e.clientX-sx)>5||Math.abs(e.clientY-sy)>5)moved=true;
    const nx=clamp(ox+(e.clientX-sx)/rect.width*100,3,97);
    const ny=clamp(oy-(e.clientY-sy)/rect.height*100,3,97);
    if(mode==='anim'){
      if(recording){const last=pts[pts.length-1];if(Math.hypot(nx-last.x,ny-last.y)>2.2)pts.push({x:nx,y:ny});drawTempPath(actor,pts);}
      el.style.left=nx+'%';el.style.top=(100-ny)+'%';
    }else{
      base().x=nx;base().y=ny;el.style.left=nx+'%';el.style.top=(100-ny)+'%';
    }
  });
  el.addEventListener('pointerup',e=>{
    el.classList.remove('drag');
    if(sx===undefined)return;sx=undefined;
    if(mode==='anim'){
      recording=false;tempDraw=null;
      if(!moved){
        el.style.left=ox+'%';el.style.top=(100-oy)+'%';
        // ボールや他選手と被っている場合は、タップごとに前面の対象を切り替える
        const grp=overlapGroupAt(actor);
        if(grp.length>1){
          const i=grp.indexOf(raised);
          const next=grp[(i+1)%grp.length];
          setRaised(next); selActor=next;
          drawPaths();renderClips();
          toast('操作対象：'+actorLabel(next)+'（被り切替）');
        }else{
          setRaised(null);
          selActor=(selActor===actor?null:actor);
          drawPaths();renderClips();
        }
        return;
      }
      const path=simplify(pts);
      if(path.length>=2)setMove(actor,path);
      el.style.left=ox+'%';el.style.top=(100-oy)+'%';
      drawPaths();renderClips();updateScrub();save();
      toast('ルートを追加しました');
      return;
    }
    // ----- edit モード -----
    if(!moved){ if(actor!=='ball')onSlotTap(actor); return; }
    if(actor==='ball'){ save(); return; }
    let tj=-1,best=46;
    for(let j=0;j<state.slots.length;j++){
      if(j===actor)continue;
      const cx=rect.left+state.slots[j].x/100*rect.width;
      const cy=rect.top+(100-state.slots[j].y)/100*rect.height;
      const d=Math.hypot(e.clientX-cx,e.clientY-cy);
      if(d<best){best=d;tj=j;}
    }
    if(tj>=0){
      const t=state.slots[actor].pid;state.slots[actor].pid=state.slots[tj].pid;state.slots[tj].pid=t;
      state.slots[actor].x=ox;state.slots[actor].y=oy;
      render();save();toast('ポジションを入れ替えました');
    }else{
      // 空きスペースへ移動 → 新しい位置からポジション名を自動判定
      const s=state.slots[actor];
      const nr=roleFromXY(s.x,s.y);
      if(nr!==s.role){ s.role=nr; render(); toast('ポジションを '+nr+' に変更'); }
      save();
    }
  });
  el.addEventListener('pointercancel',()=>{el.classList.remove('drag');sx=undefined;recording=false;tempDraw=null;});
}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

/* シートのスワイプ操作：上で拡大／下で閉じる（グラブハンドル） */
(function setupSheetDrag(){
  const zone=document.getElementById('grabzone'); if(!zone)return;
  let startY=null,dy=0,dragging=false;
  zone.addEventListener('pointerdown',e=>{
    dragging=true;startY=e.clientY;dy=0;
    sheet.style.transition='none';
    try{ zone.setPointerCapture(e.pointerId); }catch(_){}
  });
  zone.addEventListener('pointermove',e=>{
    if(!dragging)return;
    dy=e.clientY-startY;
    if(dy>0){ // 下方向：指に追従
      sheet.style.transform='translateY('+dy+'px)';
    }else{ // 上方向：拡大
      sheet.classList.add('expanded');
      sheet.style.transform='translateY(0)';
    }
  });
  const end=()=>{
    if(!dragging)return; dragging=false;
    sheet.style.transition='';
    sheet.style.transform='';
    if(dy>110){ closeSheet(); }                                  // 大きく下げたら閉じる
    else if(dy>30){ sheet.classList.remove('expanded'); }        // 少し下げたら通常サイズへ
    startY=null;dy=0;
  };
  zone.addEventListener('pointerup',end);
  zone.addEventListener('pointercancel',end);
  // ハンドルのダブルタップで拡大⇔通常をトグル
  let lastTap=0;
  zone.addEventListener('click',()=>{
    const now=Date.now();
    if(now-lastTap<300){ sheet.classList.toggle('expanded'); }
    lastTap=now;
  });
})();

    <div class="filters" id="clubF">${clubChips()}</div>
  </div>
  <div class="list" id="plist"></div>`;
}
function posChips(f=pickFilter){
  const opts=[["ALL","全部"],["GK","GK"],["DF","DF"],["MF","MF"],["FW","FW"]];
  return opts.map(o=>`<div class="fchip ${f.pos===o[0]?'on':''}" data-pos="${o[0]}">${o[1]}</div>`).join('');
}
function lgChips(f=pickFilter){
  const opts=[["ALL","全リーグ"],["PL","プレミア"],["LL","ラ・リーガ"],["SA","セリエA"],["BL","ブンデス"],["L1","リーグ・アン"]];
  return opts.map(o=>`<div class="fchip ${f.lg===o[0]?'on':''}" data-lg="${o[0]}">${o[1]}</div>`).join('');
}
function clubChips(f=pickFilter){
  const clubs=f.lg==='ALL'
    ?[...new Set(P.map(p=>p[4].trim()))].sort()
    :[...new Set(P.filter(p=>p[5]===f.lg).map(p=>p[4].trim()))].sort();
  return `<div class="fchip ${f.club==='ALL'?'on':''}" data-club="ALL">全クラブ</div>`+
    clubs.map(c=>`<div class="fchip ${f.club===c?'on':''}" data-club="${c}">${c}</div>`).join('');
}
function wirePicker(slotIdx){
  const q=document.getElementById('pq');
  if(q) q.oninput=()=>{pickFilter.q=q.value.toLowerCase();drawPickList(slotIdx)};
  const posF=document.getElementById('posF');
  if(posF) posF.onclick=e=>{const c=e.target.closest('[data-pos]');if(!c)return;pickFilter.pos=c.dataset.pos;[...c.parentNode.children].forEach(x=>x.classList.remove('on'));c.classList.add('on');drawPickList(slotIdx)};
  const lgF=document.getElementById('lgF');
  if(lgF) lgF.onclick=e=>{const c=e.target.closest('[data-lg]');if(!c)return;pickFilter.lg=c.dataset.lg;pickFilter.club='ALL';[...c.parentNode.children].forEach(x=>x.classList.remove('on'));c.classList.add('on');const cf=document.getElementById('clubF');if(cf)cf.innerHTML=clubChips();wirePickClub(slotIdx);drawPickList(slotIdx)};
  wirePickClub(slotIdx);
  drawPickList(slotIdx);
}
function wirePickClub(slotIdx){
  const clubF=document.getElementById('clubF');
  if(!clubF)return;
  clubF.onclick=e=>{const c=e.target.closest('[data-club]');if(!c)return;pickFilter.club=c.dataset.club;[...c.parentNode.children].forEach(x=>x.classList.remove('on'));c.classList.add('on');drawPickList(slotIdx);};
}
function playerMatches(p){
  if(pickFilter.lg!=='ALL'&&p[5]!==pickFilter.lg)return false;
  if(pickFilter.pos!=='ALL'&&grp(p[1]).toUpperCase()!==pickFilter.pos)return false;
  if(pickFilter.club!=='ALL'&&p[4].trim()!==pickFilter.club)return false;
  if(pickFilter.q&&!(p[0].toLowerCase().includes(pickFilter.q)||p[4].toLowerCase().includes(pickFilter.q)))return false;
  return true;
}
function inXI(pid){return state.slots.some(s=>s.pid===pid)}
function drawPickList(slotIdx){
  const list=document.getElementById('plist');if(!list)return;
  pickCurIdx=P.map((p,i)=>i).filter(i=>playerMatches(P[i]));
  pickCurIdx.sort((a,b)=>P[b][6]-P[a][6]);
  if(!pickCurIdx.length){list.innerHTML='<div class="empty-msg">該当する選手がいません</div>';return;}
  list.innerHTML=pickCurIdx.slice(0,PAGE).map(i=>prowHTML(i)).join('');
  if(pickCurIdx.length>PAGE) list.insertAdjacentHTML('beforeend',`<div class="loadmore" id="pickMore">▾ さらに ${pickCurIdx.length-PAGE}人</div>`);
  list._loaded=Math.min(PAGE,pickCurIdx.length);
  list.onscroll=()=>{
    if(list.scrollTop+list.clientHeight>=list.scrollHeight-80){
      const start=list._loaded;if(start>=pickCurIdx.length)return;
      const more=pickCurIdx.slice(start,start+PAGE);
      const s=document.getElementById('pickMore');
      if(s)s.insertAdjacentHTML('beforebegin',more.map(i=>prowHTML(i)).join(''));
      list._loaded=start+more.length;
      const ns=document.getElementById('pickMore');
      if(ns){const rem=pickCurIdx.length-list._loaded;if(rem<=0)ns.remove();else ns.textContent='▾ さらに '+rem+'人';}
    }
  };
  list.onclick=e=>{const row=e.target.closest('[data-pid]');if(!row)return;assign(slotIdx,+row.dataset.pid);};
}
function prowHTML(i){
  const p=P[i],g=grp(p[1]),already=inXI(i);
  return `<div class="prow ${already?'inxi':''}" data-pid="${i}">
    <div class="pos ${g}">${p[1]}</div>
    <div class="meta">
      <div class="nm">${p[0].trim()} ${already?'<span class="badge">●起用中</span>':''}</div>
      <div class="sub">${p[3]} · ${p[4]} · ${p[2]}歳</div>
    </div>
    <div class="price">€${p[6]}M</div>
  </div>`;
}
function assign(slotIdx,pid){
  // 同じ選手が他スロットにいたら外す（重複起用防止）
  state.slots.forEach(s=>{if(s.pid===pid)s.pid=null});

function openDetail(pid,slotIdx){
  const p=P[pid];const ph=state.photos[pid];

      (inBench

function addToXI(pid){
  // 同グループの空きを優先、なければ最初の空き

  if(target<0){toast('スタメンが11人埋まっています。誰かを外してください');return;}
  assign(target,pid);
}

function clubColors(c){
  let h=0;for(let k=0;k<c.length;k++)h=(h*31+c.charCodeAt(k))>>>0;
  const hue=h%360, hue2=(hue+40)%360;
  return [`hsl(${hue},58%,42%)`,`hsl(${hue2},60%,30%)`];
}
function clubRow(c){

  return `<div class="prow" data-club="${c}">
    <div class="emblem" style="width:40px;height:40px;font-size:14px;flex:0 0 auto;background:linear-gradient(150deg,${a},${b})">${init}</div>
    <div class="meta"><div class="nm">${c}</div><div class="sub">${lg} · ${players.length}名収録</div></div>

}

function escAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function loadClub(club){
  const squad=P.map((p,i)=>({i,p})).filter(o=>o.p[4].trim()===club);
  // ポジショングループごとに分配
  const pool={gk:[],df:[],mf:[],fw:[]};
  squad.sort((a,b)=>b.p[6]-a.p[6]).forEach(o=>pool[grp(o.p[1])].push(o.i));
  const used=new Set();
  state.slots.forEach(s=>{
    const g=grp(s.role);
    let pid=pool[g].find(id=>!used.has(id));
    if(pid==null){ // フォールバック：他グループから
      const all=[...pool.gk,...pool.df,...pool.mf,...pool.fw];
      pid=all.find(id=>!used.has(id));
    }
    if(pid!=null){used.add(pid);s.pid=pid;} else s.pid=null;
  });
  // 起用しなかった残りの選手はベンチへ
  state.bench=squad.map(o=>o.i).filter(id=>!used.has(id));
  state.loadedClub=club;
  state.teamName=club;
  state.teamInfo=null;
  state.captain=null;
  autoAssignSubs(); // 第二候補を初期割当（以後は手動・自動では変わらない）
  closeSheet();render();save();toast(club+' のスタメン・控え・第二候補を配置しました');
}

const APP_URL='https://starting-xi.app';
function roleCol(role){const g=grp(role);return {gk:'#ffd166',df:'#4fc3f7',mf:'#caff3a',fw:'#ff8a65'}[g]||'#caff3a';}
function roundRect(x,X,Y,W,H,r){x.beginPath();x.moveTo(X+r,Y);x.arcTo(X+W,Y,X+W,Y+H,r);x.arcTo(X+W,Y+H,X,Y+H,r);x.arcTo(X,Y+H,X,Y,r);x.arcTo(X,Y,X+W,Y,r);x.closePath();}

// 端末内の選手写真を事前ロード（共有画像に反映するため）
function preloadPhotos(){
  const targets=state.slots.filter(s=>s.pid!=null&&state.photos[s.pid]);
  return Promise.all(targets.map(s=>new Promise(res=>{
    const im=new Image();
    im.onload=()=>res([s.pid,im]); im.onerror=()=>res(null);
    im.src=state.photos[s.pid];
  }))).then(arr=>{ const m={}; arr.forEach(e=>{ if(e)m[e[0]]=e[1]; }); return m; });
}
// 頭〜肩のシルエット（イニシャルは入れない）
function drawSilhouette(x,fx,fy,R){
  x.save();
  x.beginPath();x.arc(fx,fy,R-4,0,7);x.clip();
  x.fillStyle='rgba(234,255,240,.82)';
  // 頭
  x.beginPath();x.arc(fx,fy-9,12,0,7);x.fill();
  // 肩
  x.beginPath();x.arc(fx,fy+30,23,Math.PI,2*Math.PI);x.fill();
  x.restore();
}
async function buildShareCanvas(){
  const photoImgs=await preloadPhotos();
  const W=1080,H=1440,cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const x=cv.getContext('2d');
  const accent=(state.teamInfo&&state.teamInfo.color)||'#caff3a';
  // 背景
  const bg=x.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#16221c');bg.addColorStop(.45,'#0a0e0c');bg.addColorStop(1,'#0a0e0c');
  x.fillStyle=bg;x.fillRect(0,0,W,H);
  // ヘッダー：アプリ名（常に表示）
  x.textBaseline='alphabetic';x.textAlign='left';
  x.font='800 58px Manrope,sans-serif';x.fillStyle='#eafff0';x.fillText('STARTING',56,104);
  const w1=x.measureText('STARTING ').width;
  x.fillStyle=accent;x.fillText(' XI',56+w1,104);
  // フォーメーション右上
  x.textAlign='right';x.font='800 46px "Bebas Neue",Manrope,sans-serif';x.fillStyle='#7d9389';
  x.fillText(state.formation,W-56,100);x.textAlign='left';
  // チーム名（ピル）
  const tn=teamDisplayName();let headBottom=150;
  if(tn){
    x.font='800 34px Manrope,sans-serif';const pw=Math.min(x.measureText(tn).width,W-180);
    x.fillStyle=accent;roundRect(x,56,128,pw+52,60,30);x.fill();
    x.fillStyle='#0a0e0c';x.fillText(tn,84,170);headBottom=210;
    if(state.teamInfo&&state.teamInfo.slogan){x.font='600 26px Manrope,sans-serif';x.fillStyle='#7d9389';x.fillText(state.teamInfo.slogan,58,244);headBottom=260;}
  }
  // ピッチ
  const px=46,py=Math.max(270,headBottom+30),pw=W-92,ph=920;
  // 芝のストライプ
  const stripes=11;for(let i=0;i<stripes;i++){x.fillStyle=(i%2===0)?'#15493a':'#12402f';x.fillRect(px,py+ph/stripes*i,pw,ph/stripes+1);}
  roundRect(x,px,py,pw,ph,24);x.save();x.clip();
  // マーキング
  x.strokeStyle='rgba(255,255,255,.16)';x.lineWidth=3;
  x.strokeRect(px+pw*0.24,py,pw*0.52,ph*0.14);
  x.strokeRect(px+pw*0.24,py+ph*0.86,pw*0.52,ph*0.14);
  x.beginPath();x.moveTo(px+pw*0.05,py+ph/2);x.lineTo(px+pw*0.95,py+ph/2);x.stroke();
  x.beginPath();x.arc(px+pw/2,py+ph/2,pw*0.13,0,7);x.stroke();
  x.restore();
  roundRect(x,px,py,pw,ph,24);x.lineWidth=4;x.strokeStyle='rgba(255,255,255,.12)';x.stroke();
  // トークン
  state.slots.forEach(s=>{
    if(s.pid==null)return;const p=P[s.pid];
    const fx=px+(s.x/100)*pw, fy=py+((100-s.y)/100)*ph, R=42;
    x.beginPath();x.arc(fx,fy,R,0,7);x.fillStyle='#10160f';x.fill();
    x.textAlign='center';
    const im=photoImgs[s.pid];
    if(im){
      // ユーザーが追加した写真を円形に反映
      x.save();x.beginPath();x.arc(fx,fy,R-4,0,7);x.clip();
      const side=Math.min(im.width,im.height);
      const sx=(im.width-side)/2, sy=(im.height-side)/2;
      x.drawImage(im,sx,sy,side,side, fx-(R-4),fy-(R-4),(R-4)*2,(R-4)*2);
      x.restore();
    }else{
      // 写真なしは頭の形のシルエット（イニシャルは入れない）
      drawSilhouette(x,fx,fy,R);
    }
    x.lineWidth=6;x.strokeStyle=roleCol(s.role);x.beginPath();x.arc(fx,fy,R,0,7);x.stroke();
    // キャプテン
    if(state.captain===s.pid){x.beginPath();x.arc(fx-R+8,fy-R+8,16,0,7);x.fillStyle='#ffd166';x.fill();x.fillStyle='#0a0e0c';x.font='800 20px Manrope,sans-serif';x.fillText('C',fx-R+8,fy-R+15);}
    // 価値バッジ
    x.font='800 19px Manrope,sans-serif';const vt='€'+p[6]+'M';const vw=x.measureText(vt).width;
    x.fillStyle=accent;roundRect(x,fx+R-vw/2-12,fy+R-13,vw+18,26,13);x.fill();
    x.fillStyle='#0a0e0c';x.fillText(vt,fx+R+1,fy+R+5);
    // 名前
    x.fillStyle='#eafff0';x.font='800 26px Manrope,sans-serif';
    x.fillText(shortName(p[0]),fx,fy+R+46);
    // 役職
    x.fillStyle=roleCol(s.role);x.font='700 19px Manrope,sans-serif';
    x.fillText(s.role,fx,fy+R+70);
    // 第二候補
    if(s.sub!=null&&P[s.sub]){x.fillStyle='#ffc46b';x.font='700 18px Manrope,sans-serif';x.fillText('▸ '+shortName(P[s.sub][0]),fx,fy+R+92);}
    x.textAlign='left';
  });
  // フッター
  const fy=py+ph+58;
  const xi=state.slots.filter(s=>s.pid!=null).map(s=>P[s.pid]);
  const val=xi.reduce((a,p)=>a+p[6],0);
  x.fillStyle='#7d9389';x.font='700 26px Manrope,sans-serif';x.textAlign='left';
  x.fillText('SQUAD VALUE',56,fy);
  x.fillStyle=accent;x.font='800 40px "Bebas Neue",Manrope,sans-serif';
  x.fillText(fmtValPlain(val),56,fy+44);
  x.textAlign='right';x.fillStyle='#5a6b62';x.font='700 24px Manrope,sans-serif';
  x.fillText('⚽ made with STARTING XI',W-56,fy);
  x.fillStyle=accent;x.font='700 24px Manrope,sans-serif';
  x.fillText(APP_URL.replace('https://',''),W-56,fy+38);
  x.textAlign='left';
  return cv;
}
function fmtValPlain(m){ return m>=1000 ? '€'+(m/1000).toFixed(2)+'B' : '€'+m+'M'; }

  if(!ballEl){ ballEl=document.createElement('div'); ballEl.className='ball'; ballEl.innerHTML='<div class="b"></div>'; pitch.appendChild(ballEl); attachDrag(ballEl,'ball'); }
  ballEl.style.left=state.ball.x+'%'; ballEl.style.top=(100-state.ball.y)+'%';
}
function actorColor(a){ if(a==='ball')return '#ffffff'; const c={gk:'#ffd166',df:'#4fc3f7',mf:'#caff3a',fw:'#ff8a65'}; return c[grp(state.slots[a].role)]||'#caff3a'; }
function actorLabel(a){ if(a==='ball')return '⚽ ボール'; const s=state.slots[a]; return (s.pid!=null?shortName(P[s.pid][0]):'(空き)')+' · '+s.role; }
function pathLen(path){let L=0;for(let k=1;k<path.length;k++)L+=Math.hypot(path[k].x-path[k-1].x,path[k].y-path[k-1].y);return L;}
function simplify(pts){ if(pts.length<=30)return pts.slice(); const out=[];const step=pts.length/30;for(let k=0;k<30;k++)out.push(pts[Math.floor(k*step)]);out.push(pts[pts.length-1]);return out; }
function setMove(actor,path){
  const len=pathLen(path), dur=Math.max(.6,Math.min(4,len/22));
  const ex=state.anim.moves.find(m=>m.actor===actor);
  if(ex){ ex.path=path; } else state.anim.moves.push({actor,path,start:0,dur:+dur.toFixed(2)});
  selActor=actor;
}
function ease(p){return p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;}
function animTotal(){let m=0;state.anim.moves.forEach(x=>m=Math.max(m,x.start+x.dur));return Math.max(0.8,m);}
function alongPath(path,p){
  const L=pathLen(path); if(L===0)return {x:path[0].x,y:path[0].y};
  let target=p*L,acc=0;
  for(let k=1;k<path.length;k++){const seg=Math.hypot(path[k].x-path[k-1].x,path[k].y-path[k-1].y);
    if(acc+seg>=target){const r=seg?(target-acc)/seg:0;return{x:path[k-1].x+(path[k].x-path[k-1].x)*r,y:path[k-1].y+(path[k].y-path[k-1].y)*r};}
    acc+=seg;}
  return {x:path[path.length-1].x,y:path[path.length-1].y};
}
function actorPos(actor,t){
  const b=actor==='ball'?state.ball:state.slots[actor];
  const m=state.anim.moves.find(x=>x.actor===actor);
  if(!m)return {x:b.x,y:b.y};
  if(t<=m.start)return {x:m.path[0].x,y:m.path[0].y};
  if(t>=m.start+m.dur)return {x:m.path[m.path.length-1].x,y:m.path[m.path.length-1].y};
  return alongPath(m.path,ease((t-m.start)/m.dur));
}
function applyPlayhead(t){
  for(let i=0;i<11;i++){const el=tokenEls[i];if(!el)continue;const q=actorPos(i,t);el.style.left=q.x+'%';el.style.top=(100-q.y)+'%';}
  if(ballEl){const q=actorPos('ball',t);ballEl.style.left=q.x+'%';ballEl.style.top=(100-q.y)+'%';}
}
function arrowHead(a,b,col){
  const ax=a.x,ay=100-a.y,bx=b.x,by=100-b.y,ang=Math.atan2(by-ay,bx-ax),Lh=2.6,W=1.6;
  const x1=bx-Lh*Math.cos(ang)+W*Math.sin(ang),y1=by-Lh*Math.sin(ang)-W*Math.cos(ang);
  const x2=bx-Lh*Math.cos(ang)-W*Math.sin(ang),y2=by-Lh*Math.sin(ang)+W*Math.cos(ang);
  return `<polygon points="${bx.toFixed(1)},${by.toFixed(1)} ${x1.toFixed(1)},${y1.toFixed(1)} ${x2.toFixed(1)},${y2.toFixed(1)}" fill="${col}"/>`;
}
function orderRank(m){ const ms=[...state.anim.moves].sort((a,b)=>a.start-b.start); return ms.indexOf(m)+1; }
function drawPaths(){
  const svg=document.getElementById('pathsvg'); if(!svg)return;
  if(mode!=='anim'){ svg.innerHTML=''; return; }
  let s='';
  state.anim.moves.forEach(m=>{
    if(m.path.length<2)return;
    const col=actorColor(m.actor),sel=(m.actor===selActor);
    const pts=m.path.map(p=>`${p.x.toFixed(1)},${(100-p.y).toFixed(1)}`).join(' ');
    s+=`<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="${sel?1:0.8}" stroke-linecap="round" stroke-linejoin="round" opacity="${sel?1:.8}" ${sel?'':'stroke-dasharray="2 1.4"'}/>`;
    s+=arrowHead(m.path[m.path.length-2],m.path[m.path.length-1],col);
    const st=m.path[0],n=orderRank(m);
    s+=`<circle cx="${st.x.toFixed(1)}" cy="${(100-st.y).toFixed(1)}" r="2.7" fill="${col}" stroke="#0a0e0c" stroke-width="0.4"/><text x="${st.x.toFixed(1)}" y="${(100-st.y+1).toFixed(1)}" text-anchor="middle" style="font:800 3px Manrope,sans-serif" fill="#0a0e0c">${n}</text>`;
  });
  if(tempDraw&&tempDraw.pts.length>1){
    const pts=tempDraw.pts.map(p=>`${p.x.toFixed(1)},${(100-p.y).toFixed(1)}`).join(' ');
    s+=`<polyline points="${pts}" fill="none" stroke="${actorColor(tempDraw.actor)}" stroke-width="1" stroke-dasharray="2 1.5" stroke-linecap="round"/>`;
  }
  svg.innerHTML=s;
}
function drawTempPath(actor,pts){ tempDraw={actor,pts}; drawPaths(); }

/* transport */
function updateScrub(){const T=animTotal();const sc=document.getElementById('aScrub');if(sc)sc.value=Math.round(Math.min(play.t,T)/T*1000);const cur=document.getElementById('aCur');if(cur)cur.textContent=Math.min(play.t,T).toFixed(1)+'s';const tot=document.getElementById('aTot');if(tot)tot.textContent=T.toFixed(1)+'s';}
function tick(ts){
  if(!play.playing)return;
  if(!play.last)play.last=ts;
  const dt=(ts-play.last)/1000*play.speed;play.last=ts;play.t+=dt;
  const T=animTotal();
  if(play.t>=T){play.t=T;applyPlayhead(T);updateScrub();stopPlay();return;}
  applyPlayhead(play.t);updateScrub();play.raf=requestAnimationFrame(tick);
}
function startPlay(){ if(!state.anim.moves.length){toast('まずルートを描いてください');return;} if(play.t>=animTotal())play.t=0; play.playing=true;play.last=0; const b=document.getElementById('aPlay');if(b)b.textContent='⏸ 停止'; const fp=document.getElementById('fpPlay');if(fp)fp.textContent='⏸ 停止'; play.raf=requestAnimationFrame(tick); }
function stopPlay(){ play.playing=false; cancelAnimationFrame(play.raf); const b=document.getElementById('aPlay');if(b)b.textContent='▶ 再生'; const fp=document.getElementById('fpPlay');if(fp)fp.textContent='▶ 再生'; }
function resetPlay(){ stopPlay(); play.t=0; applyPlayhead(0); updateScrub(); }

/* clips / timeline */
function renderClips(){
  const wrap=document.getElementById('clips'); if(!wrap)return; const T=animTotal();
  if(!state.anim.moves.length){ wrap.innerHTML='<div class="clipsEmpty">選手や ⚽ をピッチ上で指でなぞると、その軌道がクリップとして追加されます。<br>複数追加して「開始」をずらせば、時間差での連動も作れます。</div>'; return; }
  const ms=[...state.anim.moves].sort((a,b)=>a.start-b.start);
  wrap.innerHTML=ms.map(m=>{
    const idx=state.anim.moves.indexOf(m),col=actorColor(m.actor),sel=m.actor===selActor;
    return `<div class="clip ${sel?'sel':''}" data-mi="${idx}">
      <div class="crow"><span class="cdot" style="background:${col}"></span>
        <span class="cname">${actorLabel(m.actor)}</span>
        <span class="ctime">開始 ${m.start.toFixed(1)}s ・ ${m.dur.toFixed(1)}s</span></div>
      <div class="gantt"><div class="gbar" style="left:${(m.start/T*100).toFixed(1)}%;width:${(m.dur/T*100).toFixed(1)}%;background:${col}"></div></div>
      <div class="cedit">
        <label>開始 <input type="range" data-k="start" data-mi="${idx}" min="0" max="80" value="${Math.round(m.start*10)}"><b>${m.start.toFixed(1)}s</b></label>
        <label>長さ <input type="range" data-k="dur" data-mi="${idx}" min="3" max="60" value="${Math.round(m.dur*10)}"><b>${m.dur.toFixed(1)}s</b></label>
        <button class="cdel" data-del="${idx}">このルートを削除</button>
      </div></div>`;
  }).join('');
  // 選択中のクリップ（設定パネル）を見切れないように自動スクロール
  const selEl=wrap.querySelector('.clip.sel');
  if(selEl) requestAnimationFrame(()=>{ try{ selEl.scrollIntoView({block:'nearest',behavior:'smooth'}); }catch(e){ selEl.scrollIntoView(); } });
}

/* ---------- paths visibility toggle ---------- */
let showPaths=true;
function setShowPaths(v){
  showPaths=v;
  const app=document.querySelector('.app');
  app.classList.toggle('nopaths',!showPaths);
  const chip=document.getElementById('aTogglePaths');
  if(chip){chip.classList.toggle('on',showPaths);chip.textContent=showPaths?'〰 ルート表示':'〰 ルート非表示';}
}

/* ---------- fullplay (全画面再生) ---------- */
function enterFullplay(){
  if(!state.anim.moves.length){toast('まずルートを描いてください');return;}
  stopPlay();play.t=0;applyPlayhead(0);
  document.querySelector('.app').classList.add('fullplay');
  document.getElementById('fpover').classList.add('on');
  document.getElementById('scroll').scrollTop=0;
  const fp=document.getElementById('fpPlay');if(fp)fp.textContent='▶ 再生';
}
function exitFullplay(){
  stopPlay();
  document.querySelector('.app').classList.remove('fullplay');
  document.getElementById('fpover').classList.remove('on');
  render();
}

/* studio open/close */
function openStudio(){
  showPaths=true; raised=null;
  document.querySelector('.app').classList.remove('nopaths');
  const chip=document.getElementById('aTogglePaths');if(chip){chip.classList.add('on');chip.textContent='〰 ルート表示';}
  mode='anim'; selActor=null; play.t=0;
  document.querySelector('.app').classList.add('anim');
  stopPlay(); render(); renderClips(); updateScrub();
  const sc=document.getElementById('scroll');if(sc)sc.scrollTop=0;
}
function closeStudio(){
  if(document.querySelector('.app').classList.contains('fullplay'))exitFullplay();
  stopPlay(); mode='edit'; selActor=null; tempDraw=null; raised=null;
  if(ballEl)ballEl.classList.remove('raised');
  document.querySelector('.app').classList.remove('anim','nopaths');
  showPaths=true; render(); save();
}

document.getElementById('btnAnim').onclick=openStudio;
document.getElementById('aTogglePaths').onclick=()=>setShowPaths(!showPaths);
document.getElementById('aFull').onclick=enterFullplay;
document.getElementById('fpPlay').onclick=()=>{play.playing?stopPlay():startPlay();};
document.getElementById('fpReset').onclick=resetPlay;
document.getElementById('fpShare').onclick=shareLineup;
document.getElementById('fpClose').onclick=exitFullplay;
document.getElementById('aDone').onclick=closeStudio;
document.getElementById('aPlay').onclick=()=>{ play.playing?stopPlay():startPlay(); };
document.getElementById('aReset').onclick=resetPlay;
document.getElementById('aUndo').onclick=()=>{
  if(!state.anim.moves.length){toast('元に戻すルートがありません');return;}
  stopPlay();
  const last=state.anim.moves.pop();
  if(selActor===last.actor)selActor=null;
  renderClips();drawPaths();updateScrub();save();
  toast('最後のルートを削除しました');
};
document.getElementById('aClear').onclick=()=>{ stopPlay(); state.anim.moves=[]; selActor=null; render(); renderClips(); updateScrub(); save(); toast('全ルートを消去しました'); };
document.getElementById('aSpd').onchange=e=>{ play.speed=+e.target.value; };
document.getElementById('aScrub').oninput=e=>{ stopPlay(); const T=animTotal(); play.t=(+e.target.value)/1000*T; applyPlayhead(play.t); const cur=document.getElementById('aCur');if(cur)cur.textContent=play.t.toFixed(1)+'s'; };
const clipsEl=document.getElementById('clips');
clipsEl.addEventListener('input',e=>{
  const inp=e.target.closest('input[type=range]'); if(!inp)return;
  const m=state.anim.moves[+inp.dataset.mi]; if(!m)return;
  const v=(+inp.value)/10;
  if(inp.dataset.k==='start')m.start=v; else m.dur=Math.max(.3,v);
  const lab=inp.parentNode.querySelector('b'); if(lab)lab.textContent=v.toFixed(1)+'s';
  const clip=inp.closest('.clip'),T=animTotal();
  clip.querySelector('.ctime').textContent=`開始 ${m.start.toFixed(1)}s ・ ${m.dur.toFixed(1)}s`;
  const bar=clip.querySelector('.gbar'); bar.style.left=(m.start/T*100)+'%'; bar.style.width=(m.dur/T*100)+'%';
  drawPaths(); updateScrub(); save();
});
clipsEl.addEventListener('click',e=>{
  const del=e.target.closest('[data-del]');
  if(del){ const mi=+del.dataset.del,m=state.anim.moves[mi]; state.anim.moves.splice(mi,1); if(m&&selActor===m.actor)selActor=null; renderClips();drawPaths();updateScrub();save();toast('ルートを削除しました'); return; }
  if(e.target.closest('input,button'))return;
  const clip=e.target.closest('.clip'); if(!clip)return;
  const m=state.anim.moves[+clip.dataset.mi]; selActor=(selActor===m.actor?null:m.actor); renderClips(); drawPaths();
});

/* =========================================================
   Init
   ========================================================= */
(async function init(){
  const saved=await load();
  const ph=await loadPhotos();
  if(ph&&typeof ph==='object')state.photos=ph;
  if(saved&&saved.slots&&saved.slots.length===11){
    state.formation=saved.formation||"4-3-3";
    state.slots=saved.slots;
    state.bench=Array.isArray(saved.bench)?saved.bench:[];
    if(saved.ball&&typeof saved.ball.x==='number')state.ball=saved.ball;
    if(saved.anim&&Array.isArray(saved.anim.moves))state.anim=saved.anim;
    state.loadedClub=saved.loadedClub||null;
    state.captain=(saved.captain!=null)?saved.captain:null;
    state.teamName=saved.teamName||null;
    state.teamInfo=saved.teamInfo||null;
    [...fbar.children].forEach(c=>c.classList.toggle('on',c.textContent===state.formation));
  }else{
    buildSlots("4-3-3",false);
  }
  render();
})();
</script>
